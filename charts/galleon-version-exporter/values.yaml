galleonName: ""

image:
  repository: python
  tag: "3.12-slim"
  pullPolicy: IfNotPresent

scrapeInterval: 300s

# Namespace where the ServiceMonitor will be created
# Must match where Prometheus looks for ServiceMonitors
serviceMonitorNamespace: monitoring

# ServiceMonitor extra labels (to match Prometheus selector)
serviceMonitorLabels: {}

# Remote-write configuration (disabled by default)
# Only enable if the cluster does NOT already have remote-write configured
remoteWrite:
  enabled: false
  centralPrometheusUrl: ""
  prometheusName: ""
  prometheusNamespace: monitoring

# Components to monitor
components:
  kubernetes:
    method: api_version
  eksa:
    method: deployment
    namespace: eksa-system
    deployment: eksa-controller-manager
  kubevirt:
    method: crd
    apiPath: /apis/kubevirt.io/v1/kubevirts
    versionField: "status.observedKubeVirtVersion"
  rook_ceph:
    method: deployment
    namespace: rook-ceph
    deployment: rook-ceph-operator
  gpu_operator:
    method: deployment
    namespace: gpu-operator
    deployment: gpu-operator
  cdi:
    method: crd
    apiPath: /apis/cdi.kubevirt.io/v1beta1/cdis
    versionField: "status.observedVersion"
  argocd:
    method: deployment
    namespace: argocd
    deployment: argocd-server
  velero:
    method: deployment
    namespace: velero
    deployment: velero
